# LocalAI shared configuration.
#
# This file is sourced by the installer and helper scripts. Values can still be
# overridden for one command by exporting the same variable before running a
# script, for example:
#
#   LOCALAI_DIR=~/my-ai LLAMA_CPP_BACKEND=cpu ./install-local-ai.sh

# Default install directory used when LOCALAI_DIR is not set.
LOCALAI_VERSION="${LOCALAI_VERSION:-1.1.15}"
LOCALAI_DEFAULT_DIR="${LOCALAI_DEFAULT_DIR:-$HOME/ai}"
LOCALAI_DEFAULT_DIR_DISPLAY="${LOCALAI_DEFAULT_DIR_DISPLAY:-~/ai}"

# Source used by localai update when refreshing installed helper scripts.
LOCALAI_REPO_URL="${LOCALAI_REPO_URL:-https://github.com/hossbit/local-ai-server.git}"
LOCALAI_TARBALL_BASE="${LOCALAI_TARBALL_BASE:-https://github.com/hossbit/local-ai-server/archive}"
LOCALAI_REF="${LOCALAI_REF:-main}"

# Installed directory names and state files.
LOCALAI_USER_BIN_DIR="${LOCALAI_USER_BIN_DIR:-$HOME/.local/bin}"
LOCALAI_CLI_NAME="${LOCALAI_CLI_NAME:-localai}"
LOCALAI_BIN_SUBDIR="${LOCALAI_BIN_SUBDIR:-bin}"
LOCALAI_LIB_SUBDIR="${LOCALAI_LIB_SUBDIR:-lib}"
LOCALAI_CONF_SUBDIR="${LOCALAI_CONF_SUBDIR:-conf}"
LOCALAI_MODELS_SUBDIR="${LOCALAI_MODELS_SUBDIR:-models}"
LOCALAI_LOGS_SUBDIR="${LOCALAI_LOGS_SUBDIR:-logs}"
LOCALAI_CONFIG_FILE="${LOCALAI_CONFIG_FILE:-config.yaml}"
LOCALAI_PORT_FILE="${LOCALAI_PORT_FILE:-port}"
LOCALAI_PID_FILE="${LOCALAI_PID_FILE:-llama-swap.pid}"
LOCALAI_BACKEND_FILE="${LOCALAI_BACKEND_FILE:-llama-cpp-backend}"

# Local HTTP endpoint defaults.
LOCALAI_LISTEN_HOST="${LOCALAI_LISTEN_HOST:-127.0.0.1}"
LOCALAI_DEFAULT_PORT="${LOCALAI_DEFAULT_PORT:-11435}"

# systemd user service.
LOCALAI_SERVICE_NAME="${LOCALAI_SERVICE_NAME:-localai.service}"
LOCALAI_SYSTEMD_USER_DIR="${LOCALAI_SYSTEMD_USER_DIR:-$HOME/.config/systemd/user}"

# llama.cpp release and backend selection.
LLAMA_CPP_VERSION="${LLAMA_CPP_VERSION:-latest}"
LOCALAI_DEFAULT_BACKEND="${LOCALAI_DEFAULT_BACKEND:-vulkan}"
LLAMA_CPP_RELEASE_API="${LLAMA_CPP_RELEASE_API:-https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/${LLAMA_CPP_VERSION}}"
LLAMA_CPP_LATEST_API="${LLAMA_CPP_LATEST_API:-https://api.github.com/repos/ggml-org/llama.cpp/releases/latest}"

# Release asset patterns for each supported llama.cpp backend.
LLAMA_CPP_CPU_ASSET_RE="${LLAMA_CPP_CPU_ASSET_RE:-ubuntu-x64\\.tar\\.gz$}"
LLAMA_CPP_VULKAN_ASSET_RE="${LLAMA_CPP_VULKAN_ASSET_RE:-ubuntu-vulkan-x64\\.tar\\.gz$}"
LLAMA_CPP_ROCM_ASSET_RE="${LLAMA_CPP_ROCM_ASSET_RE:-ubuntu-rocm-[0-9.]+-x64\\.tar\\.gz$}"
LLAMA_CPP_OPENVINO_ASSET_RE="${LLAMA_CPP_OPENVINO_ASSET_RE:-ubuntu-openvino-[0-9.]+-x64\\.tar\\.gz$}"
LLAMA_CPP_SYCL_FP16_ASSET_RE="${LLAMA_CPP_SYCL_FP16_ASSET_RE:-ubuntu-sycl-fp16-x64\\.tar\\.gz$}"
LLAMA_CPP_SYCL_FP32_ASSET_RE="${LLAMA_CPP_SYCL_FP32_ASSET_RE:-ubuntu-sycl-fp32-x64\\.tar\\.gz$}"
LOCALAI_CPU_FALLBACK="${LOCALAI_CPU_FALLBACK:-1}"

# llama-swap release.
LLAMA_SWAP_VERSION="${LLAMA_SWAP_VERSION:-latest}"
LLAMA_SWAP_RELEASE_API="${LLAMA_SWAP_RELEASE_API:-https://api.github.com/repos/mostlygeek/llama-swap/releases/tags/${LLAMA_SWAP_VERSION}}"
LLAMA_SWAP_LATEST_API="${LLAMA_SWAP_LATEST_API:-https://api.github.com/repos/mostlygeek/llama-swap/releases/latest}"
LLAMA_SWAP_ASSET_RE="${LLAMA_SWAP_ASSET_RE:-linux_amd64\\.tar\\.gz$}"
LLAMA_SWAP_URL="${LLAMA_SWAP_URL:-}"
LLAMA_SWAP_INSTALL_PATH="${LLAMA_SWAP_INSTALL_PATH:-}"
LLAMA_SWAP_BIN="${LLAMA_SWAP_BIN:-$LLAMA_SWAP_INSTALL_PATH}"
LOCALAI_SKIP_DIGEST="${LOCALAI_SKIP_DIGEST:-0}"

# Package names used by install-local-ai.sh.
LOCALAI_APT_PACKAGES="${LOCALAI_APT_PACKAGES:-ca-certificates curl iproute2 jq libvulkan1 mesa-vulkan-drivers tar}"
LOCALAI_DNF_PACKAGES="${LOCALAI_DNF_PACKAGES:-ca-certificates curl iproute jq mesa-vulkan-drivers tar vulkan-loader}"
LOCALAI_YUM_PACKAGES="${LOCALAI_YUM_PACKAGES:-ca-certificates curl iproute jq mesa-vulkan-drivers tar vulkan-loader}"

# Runtime defaults used when rebuild-config.sh generates llama-swap config.
# CPU backend uses smaller, CPU-safe defaults unless explicitly overridden.
if [ "${LLAMA_CPP_BACKEND:-$LOCALAI_DEFAULT_BACKEND}" = "cpu" ]; then
  LOCALAI_CTX_SIZE="${LOCALAI_CTX_SIZE:-4096}"
  LOCALAI_N_GPU_LAYERS="${LOCALAI_N_GPU_LAYERS:-0}"
  LOCALAI_FLASH_ATTN="${LOCALAI_FLASH_ATTN:-0}"
  LOCALAI_PARALLEL="${LOCALAI_PARALLEL:-1}"
else
  LOCALAI_CTX_SIZE="${LOCALAI_CTX_SIZE:-16384}"
  LOCALAI_N_GPU_LAYERS="${LOCALAI_N_GPU_LAYERS:-8}"
  LOCALAI_FLASH_ATTN="${LOCALAI_FLASH_ATTN:-1}"
  LOCALAI_PARALLEL="${LOCALAI_PARALLEL:-2}"
fi
LOCALAI_THREADS="${LOCALAI_THREADS:-$(nproc 2>/dev/null || printf '6')}"
LOCALAI_CACHE_TYPE_K="${LOCALAI_CACHE_TYPE_K:-f16}"
LOCALAI_CACHE_TYPE_V="${LOCALAI_CACHE_TYPE_V:-f16}"
LOCALAI_BATCH_SIZE="${LOCALAI_BATCH_SIZE:-}"
LOCALAI_UBATCH_SIZE="${LOCALAI_UBATCH_SIZE:-}"
LOCALAI_JINJA="${LOCALAI_JINJA:-1}"
LOCALAI_MLOCK="${LOCALAI_MLOCK:-0}"
LOCALAI_NO_MMAP="${LOCALAI_NO_MMAP:-0}"
LOCALAI_EXTRA_LLAMA_ARGS="${LOCALAI_EXTRA_LLAMA_ARGS:-}"
LOCALAI_HEALTH_CHECK_TIMEOUT="${LOCALAI_HEALTH_CHECK_TIMEOUT:-300}"
LOCALAI_GLOBAL_TTL="${LOCALAI_GLOBAL_TTL:-900}"
