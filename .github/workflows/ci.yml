name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: ShellCheck
        run: shellcheck -x *.sh localai lib/*.sh
      - name: Check install.sh mirror
        run: cmp -s install.sh site/localai/install.sh
      - name: Bats
        run: bats tests
